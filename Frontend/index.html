<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Resume Analyzer</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:white;
}

h1 {
  text-align:center;
  font-size:2.5rem;
  margin:20px 0;
  background: linear-gradient(90deg,#00c6ff,#0072ff);
  -webkit-background-clip:text;
  color:transparent;
}

.container {
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  padding:20px;
  backdrop-filter: blur(20px);
  transition:0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background: linear-gradient(90deg,#00c6ff,#0072ff);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}
button:hover { opacity:0.85; }

textarea, input {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:10px;
  background:#020617;
  color:white;
}

.progress-bar {
  background:#1e293b;
  border-radius:10px;
  overflow:hidden;
}
.progress {
  height:30px;
  width:0%;
  text-align:center;
  line-height:30px;
  font-weight:bold;
}

ul { padding-left:20px; }

.loader {
  text-align:center;
  display:none;
  margin-top:20px;
  font-size:18px;
}

.badge {
  padding:5px 10px;
  border-radius:10px;
  font-size:12px;
  background:#0ea5e9;
}

</style>
</head>

<body>

<h1>🚀 AI Resume Analyzer</h1>

<div class="container">

<div class="grid">

<div class="card">
<form id="form">
<div>
<span class="badge">Mode</span><br>
<label><input type="radio" name="mode" value="fast" checked> Fast</label>
<label><input type="radio" name="mode" value="ai"> AI</label>
</div>

<input type="file" id="resume" required>
<textarea id="job" placeholder="Paste Job Description"></textarea>

<button type="submit" id="btn">Analyze</button>
</form>
</div>

<div class="card">
<h3>ATS Score</h3>
<div class="progress-bar">
<div class="progress" id="progress"></div>
</div>
<h3 id="aiScore"></h3>
</div>

<div class="card"><h3>Matched Skills</h3><ul id="matched"></ul></div>
<div class="card"><h3>Missing Keywords</h3><ul id="keywords"></ul></div>
<div class="card"><h3>Suggestions</h3><ul id="suggestions"></ul></div>
<div class="card"><h3>AI Improvements</h3><ul id="improvements"></ul></div>

<div class="card">
<h3>Breakdown</h3>
<canvas id="chart"></canvas>
</div>

</div>

<div class="loader" id="loader">⏳ Analyzing...</div>

</div>

<script>
function color(score){
  if(score>75) return "#22c55e";
  if(score>50) return "#f59e0b";
  return "#ef4444";
}

document.getElementById("form").onsubmit = async(e)=>{
e.preventDefault();

let btn=document.getElementById("btn");
btn.innerText="Analyzing...";
btn.disabled=true;
loader.style.display="block";

let fd=new FormData();
fd.append("resume",resume.files[0]);
fd.append("job_desc",job.value);
fd.append("mode",document.querySelector('input[name="mode"]:checked').value);

let res=await fetch("https://resume-analyser-production-93d7.up.railway.app/analyze",{method:"POST",body:fd});
let data=await res.json();

// SCORE
let s=data["ATS Score"];
progress.style.width=s+"%";
progress.style.background=color(s);
progress.innerText=s+"%";

aiScore.innerText="AI: "+data["AI Score"];

// LISTS
function render(id,arr,msg){
document.getElementById(id).innerHTML=
(arr?.length?arr:[msg]).map(x=>`<li>${x}</li>`).join("");
}

render("matched",data["Matched Skills"],"No matches");
render("keywords",data["Missing Keywords"],"No missing");
render("suggestions",data["Suggestions"],"No suggestions");

if(data["AI Score"]==="Not Available"){
render("improvements",["AI not available"],"");
}else{
render("improvements",data["AI Improvements"],"");
}

// CHART
new Chart(chart,{
type:"bar",
data:{
labels:["AI","TF-IDF","Keywords","Sections"],
datasets:[{
data:[
data.Breakdown["AI Semantic"],
data.Breakdown["TF-IDF"],
data.Breakdown.Keywords,
data.Breakdown.Sections
]
}]
}
});

loader.style.display="none";
btn.innerText="Analyze";
btn.disabled=false;
};
</script>

</body>
</html>
