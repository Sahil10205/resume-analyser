<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ATS Resume Analyzer</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:white;
  text-align:center;
}

/* TITLE */
h1 {
  margin-top:20px;
  font-size:2.5rem;
  background: linear-gradient(90deg,#00c6ff,#0072ff);
  -webkit-background-clip:text;
  color:transparent;
}

/* CONTAINER */
.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* FORM */
.card {
  background: rgba(255,255,255,0.05);
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
}

/* INPUTS */
input, textarea {
  width:100%;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#020617;
  color:white;
}

/* BUTTON */
button {
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  background: linear-gradient(90deg,#00c6ff,#0072ff);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* CIRCLE */
.circle {
  width:200px;
  height:200px;
  border-radius:50%;
  margin:30px auto;
  background: conic-gradient(#00c6ff 0deg, #1e293b 0deg);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  font-weight:bold;
  position:relative;
}

.circle::after {
  content:"";
  position:absolute;
  width:160px;
  height:160px;
  background:#020617;
  border-radius:50%;
}

.score-text {
  position:absolute;
  font-size:28px;
}

/* HISTORY */
ul {
  text-align:left;
}

.loader {
  display:none;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>🚀 ATS Analyzer</h1>

<div class="container">

<div class="card">
<form id="form">
<input type="file" id="resume" required>
<textarea id="job" placeholder="Paste Job Description"></textarea>

<button id="btn">Analyze</button>
</form>
</div>

<!-- CIRCULAR SCORE -->
<div class="circle" id="circle">
<div class="score-text" id="scoreText">0%</div>
</div>

<!-- GRAPH -->
<div class="card">
<canvas id="chart"></canvas>
</div>

<!-- HISTORY -->
<div class="card">
<h3>History</h3>
<ul id="history"></ul>
</div>

<div class="loader" id="loader">⏳ Analyzing...</div>

</div>

<script>
let lastData=null;

// HISTORY
function saveHistory(score){
let h=JSON.parse(localStorage.getItem("history"))||[];
h.push({score,time:new Date().toLocaleString()});
localStorage.setItem("history",JSON.stringify(h));
loadHistory();
}
function loadHistory(){
let h=JSON.parse(localStorage.getItem("history"))||[];
history.innerHTML=h.map(x=>`<li>${x.score}% (${x.time})</li>`).join("");
}
loadHistory();

// ANIMATION
function animateScore(target){
let current=0;
let circle=document.getElementById("circle");
let text=document.getElementById("scoreText");

let interval=setInterval(()=>{
current++;
let deg=current*3.6;
circle.style.background=`conic-gradient(#00c6ff ${deg}deg, #1e293b ${deg}deg)`;
text.innerText=current+"%";

if(current>=target) clearInterval(interval);
},15);
}

// FORM
form.onsubmit=async(e)=>{
e.preventDefault();

btn.innerText="Analyzing...";
btn.disabled=true;
loader.style.display="block";

let fd=new FormData();
fd.append("resume",resume.files[0]);
fd.append("job_desc",job.value);

let res=await fetch("https://resume-analyser-production-93d7.up.railway.app/analyze",{method:"POST",body:fd});
let data=await res.json();

let score=data["ATS Score"];

// animate
animateScore(score);

// graph
new Chart(chart,{
type:"bar",
data:{
labels:["TF-IDF","Keywords","Sections"],
datasets:[{
data:[
data.Breakdown["TF-IDF"],
data.Breakdown["Keywords"],
data.Breakdown["Sections"]
]
}]
}
});

saveHistory(score);

loader.style.display="none";
btn.innerText="Analyze";
btn.disabled=false;
};
</script>

</body>
</html>
